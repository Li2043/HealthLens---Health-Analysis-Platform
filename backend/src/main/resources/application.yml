spring:
  application:
    name: healthlens-platform-backend
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:postgres}:${POSTGRES_PORT:5432}/${POSTGRES_DB:healthlens}
    username: ${POSTGRES_USER:healthlens}
    password: ${POSTGRES_PASSWORD:change_me}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

healthlens:
  ai-service:
    base-url: ${AI_SERVICE_BASE_URL:http://ai-service:8000}
  jwt:
    secret: ${JWT_SECRET:change-me-use-a-long-random-secret-in-production}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
