services:
  postgres:
    image: postgres:16-alpine
    container_name: healthlens-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-healthlens}
      POSTGRES_USER: ${POSTGRES_USER:-healthlens}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-healthlens} -d ${POSTGRES_DB:-healthlens}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  ai-service:
    build:
      context: ./ai-service
    container_name: healthlens-ai-service
    environment:
      EXTRACTOR_PROVIDER: ${EXTRACTOR_PROVIDER:-mock}
      LLM_PROVIDER: ${LLM_PROVIDER:-mock}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-v4-flash}
      DEEPSEEK_TIMEOUT_SECONDS: ${DEEPSEEK_TIMEOUT_SECONDS:-60}
      APP_ENV: ${APP_ENV:-docker}
      APP_VERSION: ${APP_VERSION:-dev}
      ENABLE_LEGACY_FRONTEND: ${ENABLE_LEGACY_FRONTEND:-false}
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  backend:
    build:
      context: ./backend
    container_name: healthlens-backend
    depends_on:
      postgres:
        condition: service_healthy
      ai-service:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-local}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-healthlens}
      POSTGRES_USER: ${POSTGRES_USER:-healthlens}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
      AI_SERVICE_BASE_URL: ${AI_SERVICE_BASE_URL:-http://ai-service:8000}
      # Production: set JWT_SECRET in .env (see docs/deployment.md). Do not use the dev default.
      JWT_SECRET: ${JWT_SECRET:-change-me-use-a-long-random-secret-in-production}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-86400000}
      ANALYSIS_DAILY_LIMIT: ${ANALYSIS_DAILY_LIMIT:-10}
      DEMO_ACCOUNT_ENABLED: ${DEMO_ACCOUNT_ENABLED:-true}
      DEMO_ACCOUNT_EMAIL: ${DEMO_ACCOUNT_EMAIL:-demo@healthlens.demo}
      DEMO_ACCOUNT_PASSWORD: ${DEMO_ACCOUNT_PASSWORD:-demo1234}
      DEMO_ANALYSIS_DAILY_LIMIT: ${DEMO_ANALYSIS_DAILY_LIMIT:-20}
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/api/health || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 40s

  frontend:
    build:
      context: ./frontend
    container_name: healthlens-frontend
    depends_on:
      backend:
        condition: service_started
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
      VITE_PROXY_TARGET: ${VITE_PROXY_TARGET:-http://backend:8080}
      VITE_DEMO_ACCOUNT_ENABLED: ${VITE_DEMO_ACCOUNT_ENABLED:-true}
      VITE_DEMO_ACCOUNT_EMAIL: ${VITE_DEMO_ACCOUNT_EMAIL:-demo@healthlens.demo}
      VITE_DEMO_ACCOUNT_PASSWORD: ${VITE_DEMO_ACCOUNT_PASSWORD:-demo1234}
      VITE_DEMO_ANALYSIS_DAILY_LIMIT: ${VITE_DEMO_ANALYSIS_DAILY_LIMIT:-20}
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "5173:5173"

volumes:
  postgres_data:
  frontend_node_modules:
